<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Doppler</title>
        <link rel="stylesheet" href="../style.css" />
        <script src="https://d3js.org/d3.v7.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
        <script
            id="MathJax-script"
            async
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
        ></script>
    </head>

    <body style="height: 500vh">
        <ex-header-fizik></ex-header-fizik>
        <!--HEADER-->
        <div class="mainCanvas">
            <div class="ana">
                <h2>Doppler</h2>
                <div>
                    <label for="velocitySlider">Ambulance Velocity (m/s): </label>
                    <input type="range" id="velocitySlider" min="0" max="100" value="30" step="1">
                </div>
                <div id="dopplerCanvas"></div>
            </div>
            
        </div>
        <ex-sidebar-fizik></ex-sidebar-fizik>
        <script src="../scripts.js"></script>
        <script src="../js/fizik/doppler/doppler.js"></script>
    </body>
</html>
